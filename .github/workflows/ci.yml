name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d portal"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://portal_app:portal_app@localhost:5432/portal
      DATABASE_SYNC_URL: postgresql+psycopg://portal:portal@localhost:5432/portal
      DATABASE_OWNER_URL: postgresql+asyncpg://portal:portal@localhost:5432/portal
      APP_ENV: test
      APP_SECRET_KEY: ci-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Bootstrap portal_app role
        env:
          PGPASSWORD: portal
        run: |
          psql -h localhost -U portal -d portal -f docker/postgres-init.sql

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run migrations against Postgres
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -v --cov=app --cov-report=term-missing

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: sme-client-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
