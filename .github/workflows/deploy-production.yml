name: Deploy to production

# Triggers on every push to the `production` branch (typically via a
# merge from `main` after you've verified a release). Builds a Docker
# image, pushes it to GHCR tagged with the commit SHA, then SSHes into
# the Hetzner VPS and rolls the `web` service over.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST        — public IPv4 or hostname of the VPS
#   DEPLOY_USER        — SSH user (e.g. "deploy")
#   DEPLOY_SSH_KEY     — private key (OpenSSH format, full file contents)
#   DEPLOY_PORT        — optional, defaults to 22
#
# See docs/DEPLOY_HETZNER.md for the full VPS provisioning walkthrough.

on:
  push:
    branches:
      - production
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image + roll web on Hetzner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repository
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Roll web service on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_TAG
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/assoluto

            # Pin the just-built tag so the compose file resolves it.
            sudo sed -i -E "s|^APP_IMAGE_TAG=.*$|APP_IMAGE_TAG=${IMAGE_TAG}|" /etc/assoluto/env || {
                echo "APP_IMAGE_TAG=${IMAGE_TAG}" | sudo tee -a /etc/assoluto/env >/dev/null
            }

            COMPOSE="sudo docker compose --env-file /etc/assoluto/env -f docker-compose.yml -f docker-compose.prod.yml"

            echo ">>> Pulling image…"
            $COMPOSE pull web

            echo ">>> Rolling web (migrations run via entrypoint)…"
            $COMPOSE up -d --no-deps --remove-orphans web

            echo ">>> Waiting for /healthz…"
            for i in $(seq 1 20); do
                if $COMPOSE exec -T web curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                    echo "Health OK on attempt $i"
                    $COMPOSE ps
                    exit 0
                fi
                sleep 3
            done

            echo "!!! Health check failed after 60s — container logs:"
            $COMPOSE logs --tail=200 web
            exit 1
