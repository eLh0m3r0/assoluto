# Babel extraction config for Assoluto.
#
# Extraction scans:
# - Python source (app/, scripts/) — recognises `gettext(locale, msg)`,
#   `_(...)`, `ngettext(locale, sing, plural, n)`, AND the project-specific
#   `_t(request, msg)` helper from `app.i18n`. Missing the `_t:2` keyword
#   causes extract to mark every `_t`-only string as obsolete (#~) and
#   ship the UI untranslated; see CLAUDE.md §7.
# - Jinja2 templates in app/templates/ and app/email/templates/ — the
#   i18n extension picks up `{{ _("...") }}` and `{% trans %}` blocks.
#
# Canonical run — use this command (or `make i18n`) every time:
#   uv run pybabel extract -F babel.cfg \
#       -k _t:2 -k _ -k gettext -k 'ngettext:1,2' \
#       -o app/locale/messages.pot .
#   uv run pybabel update -i app/locale/messages.pot -d app/locale
#   uv run pybabel compile -d app/locale

[python: app/**.py]
[python: scripts/**.py]

[jinja2: app/templates/**.html]
extensions = jinja2.ext.i18n

[jinja2: app/email/templates/**.html]
extensions = jinja2.ext.i18n

[jinja2: app/email/templates/**.txt]
extensions = jinja2.ext.i18n
