# Babel extraction config for the SME Client Portal.
#
# Extraction scans:
# - Python source (app/, scripts/) for `gettext()`, `_()`, `ngettext()`
# - Jinja2 templates in app/templates/ and app/email/templates/
#
# Run:
#   uv run pybabel extract -F babel.cfg -k _ -k gettext -k ngettext:1,2 \
#       -o app/locale/messages.pot .
#   uv run pybabel update -i app/locale/messages.pot -d app/locale
#   uv run pybabel compile -d app/locale

[python: app/**.py]
[python: scripts/**.py]

[jinja2: app/templates/**.html]
extensions = jinja2.ext.i18n

[jinja2: app/email/templates/**.html]
extensions = jinja2.ext.i18n

[jinja2: app/email/templates/**.txt]
extensions = jinja2.ext.i18n
