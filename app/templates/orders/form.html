{% extends "app_base.html" %}

{% block title %}Nová objednávka · {{ tenant.name }}{% endblock %}

{% block content %}
    <h1 class="mb-4 text-2xl font-bold text-slate-900">Nová objednávka</h1>

    {% include "_flash.html" %}

    <form method="post" action="/app/orders"
          class="max-w-2xl space-y-4 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <div>
            <label for="title" class="block text-sm font-medium text-slate-700">Název *</label>
            <input type="text" id="title" name="title" required
                   value="{{ form.title or '' }}" autofocus
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500">
        </div>

        {% if principal.is_staff %}
            <div>
                <label for="customer_id" class="block text-sm font-medium text-slate-700">Klient *</label>
                <select id="customer_id" name="customer_id" required
                        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
                    <option value="">— vyberte klienta —</option>
                    {% for customer in customers %}
                        <option value="{{ customer.id }}"
                                {% if form.customer_id == customer.id|string %}selected{% endif %}>
                            {{ customer.name }}{% if customer.ico %} ({{ customer.ico }}){% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>
        {% endif %}

        <div>
            <label for="requested_delivery_at" class="block text-sm font-medium text-slate-700">
                Požadovaný termín dodání
            </label>
            <input type="date" id="requested_delivery_at" name="requested_delivery_at"
                   value="{{ form.requested_delivery_at or '' }}"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
        </div>

        <div>
            <label for="notes" class="block text-sm font-medium text-slate-700">Poznámka</label>
            <textarea id="notes" name="notes" rows="3"
                      class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">{{ form.notes or '' }}</textarea>
        </div>

        <div class="flex items-center justify-end gap-3 pt-2">
            <a href="/app/orders" class="text-sm text-slate-500 hover:text-slate-900">Zrušit</a>
            <button type="submit"
                    class="rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                Vytvořit koncept
            </button>
        </div>
    </form>
{% endblock %}
