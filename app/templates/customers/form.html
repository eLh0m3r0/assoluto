{% extends "app_base.html" %}

{% block title %}Nový klient · {{ tenant.name }}{% endblock %}

{% block content %}
    <h1 class="mb-4 text-2xl font-bold text-slate-900">Nový klient</h1>

    {% include "_flash.html" %}

    <form method="post" action="/app/customers" class="max-w-lg space-y-4 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <div>
            <label for="name" class="block text-sm font-medium text-slate-700">Název firmy *</label>
            <input type="text" id="name" name="name" required value="{{ form.name or '' }}"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500">
        </div>
        <div>
            <label for="ico" class="block text-sm font-medium text-slate-700">IČO</label>
            <input type="text" id="ico" name="ico" value="{{ form.ico or '' }}"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
        </div>
        <div>
            <label for="dic" class="block text-sm font-medium text-slate-700">DIČ</label>
            <input type="text" id="dic" name="dic" value="{{ form.dic or '' }}"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
        </div>
        <div>
            <label for="notes" class="block text-sm font-medium text-slate-700">Poznámky</label>
            <textarea id="notes" name="notes" rows="3"
                      class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">{{ form.notes or '' }}</textarea>
        </div>
        <div class="flex items-center justify-end gap-3 pt-2">
            <a href="/app/customers" class="text-sm text-slate-500 hover:text-slate-900">Zrušit</a>
            <button type="submit" class="rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                Uložit
            </button>
        </div>
    </form>
{% endblock %}
