{% extends "base.html" %}

{% block title %}Assoluto — {{ _('New password') }} · {{ tenant.name if tenant else "Assoluto" }}{% endblock %}

{% block content %}
<section class="mx-auto mt-8 max-w-md">
    <div class="rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
        <h1 class="mb-1 text-xl font-semibold text-slate-900">{{ _('New password') }}</h1>
        <p class="mb-6 text-sm text-slate-500">
            {{ _('Enter a new password for your account.') }}
        </p>

        {% include "_flash.html" %}

        <form method="post" action="/auth/password-reset/confirm" class="space-y-4">
            {{ csrf_input() }}
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">
                    {{ _('New password (min. 8 characters)') }}
                </label>
                <input type="password" name="password" id="password" required minlength="8" autofocus
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
            </div>
            <div>
                <label for="password_confirm" class="block text-sm font-medium text-slate-700">
                    {{ _('Confirm password') }}
                </label>
                <input type="password" name="password_confirm" id="password_confirm" required minlength="8"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
            </div>
            <button type="submit"
                    class="w-full rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                {{ _('Set new password') }}
            </button>
        </form>
    </div>
</section>
{% endblock %}
