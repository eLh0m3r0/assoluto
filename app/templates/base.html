<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SME Client Portal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="{{ url_for('static', path='js/app.js') }}" defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
            <a href="/" class="text-lg font-semibold text-slate-900">SME Portal</a>
            <nav class="text-sm text-slate-600">
                {% block nav %}{% endblock %}
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-6xl px-4 py-6 text-xs text-slate-500">
        SME Client Portal v{{ app_version }} &middot;
        {% block footer_extra %}{% endblock %}
    </footer>
</body>
</html>
