{# Inline Assoluto logo. Scales via ``size`` (Tailwind size class, default h-8 w-8).
   Kept separate from favicon.svg so the header version can inherit rounded-square
   corners from Tailwind and the gradient is a true CSS-style SVG (sharp on Retina). #}
{% set _size = size or "h-8 w-8" %}
<svg class="{{ _size }}" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-hidden="true" focusable="false">
    <defs>
        <linearGradient id="assoluto-bg-{{ variant or 'hdr' }}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="url(#assoluto-bg-{{ variant or 'hdr' }})"/>
    <path d="M14 50 L32 18 L50 50" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 38 L42 38" fill="none" stroke="#ffffff" stroke-width="4"
          stroke-linecap="round"/>
    <circle cx="32" cy="10" r="3" fill="#ffffff"/>
</svg>
