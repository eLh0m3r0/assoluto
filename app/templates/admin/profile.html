{% extends "app_base.html" %}

{% block title %}Profil · {{ tenant.name }}{% endblock %}

{% block content %}
    <div class="mb-6">
        <a href="/app" class="text-sm text-slate-500 hover:text-slate-900">&larr; Dashboard</a>
        <h1 class="mt-2 text-2xl font-bold text-slate-900">Profil</h1>
        <p class="text-sm text-slate-500">{{ principal.email }} · {{ principal.full_name }}</p>
    </div>

    {% include "_flash.html" %}

    <section class="max-w-lg rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="mb-4 font-semibold text-slate-900">Změna hesla</h2>
        <form method="post" action="/app/admin/profile/password" class="space-y-4">
            <div>
                <label for="current_password" class="block text-sm font-medium text-slate-700">
                    Současné heslo
                </label>
                <input type="password" id="current_password" name="current_password" required
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium text-slate-700">
                    Nové heslo (min. 8 znaků)
                </label>
                <input type="password" id="new_password" name="new_password" required minlength="8"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
            </div>
            <div>
                <label for="new_password_confirm" class="block text-sm font-medium text-slate-700">
                    Potvrzení nového hesla
                </label>
                <input type="password" id="new_password_confirm" name="new_password_confirm"
                       required minlength="8"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm">
            </div>
            <button type="submit"
                    class="rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                Uložit nové heslo
            </button>
            <p class="text-xs text-slate-500">
                Po změně hesla budete odhlášeni a musíte se znovu přihlásit.
            </p>
        </form>
    </section>
{% endblock %}
