{% extends "base.html" %}

{% block title %}Platforma · Přihlášení{% endblock %}

{% block content %}
<section class="mx-auto mt-12 max-w-md">
    <div class="rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
        <h1 class="mb-1 text-xl font-semibold text-slate-900">SME Portal — platforma</h1>
        <p class="mb-6 text-sm text-slate-500">
            Přihlaste se jedním účtem ke všem portálům, do kterých máte přístup.
        </p>

        {% include "_flash.html" %}

        <form method="post" action="/platform/login" class="space-y-4">
            {{ csrf_input() }}
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700">E-mail</label>
                <input type="email" id="email" name="email" required autofocus
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">Heslo</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500">
            </div>
            <button type="submit"
                    class="w-full rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                Přihlásit se
            </button>
        </form>
        <p class="mt-5 text-center text-sm text-slate-500">
            Ještě nemáte účet?
            <a href="/platform/signup" class="font-semibold text-brand-600 hover:text-brand-700">
                Vytvořit nový portál
            </a>
        </p>
    </div>
</section>
{% endblock %}
