{% extends "base.html" %}
{% block title %}Assoluto — 403 · {{ _('Access denied') }}{% endblock %}
{% block content %}
    <section class="mx-auto mt-16 max-w-md text-center">
        <div class="rounded-lg border border-slate-200 bg-white p-10 shadow-sm">
            <div class="text-6xl font-bold text-slate-300">403</div>
            <h1 class="mt-4 text-xl font-semibold text-slate-900">{{ _('Access denied') }}</h1>
            <p class="mt-2 text-sm text-slate-600">
                {{ _('You do not have permission for this action.') }}
            </p>
            <a href="/app" class="mt-6 inline-block rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">
                {{ _('Back to dashboard') }}
            </a>
        </div>
    </section>
{% endblock %}
