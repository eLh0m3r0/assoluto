{% extends "base.html" %}
{% block title %}Assoluto — 500 · {{ _('Server error') }}{% endblock %}
{% block content %}
    <section class="mx-auto mt-16 max-w-md text-center">
        <div class="rounded-lg border border-slate-200 bg-white p-10 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="text-6xl font-bold text-slate-300 dark:text-slate-700">500</div>
            <h1 class="mt-4 text-xl font-semibold text-slate-900 dark:text-slate-100">{{ _('Something went wrong') }}</h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                {{ _('An unexpected error occurred. Please try again in a moment.') }}
            </p>
        </div>
    </section>
{% endblock %}
